[AccessTransformers]
; Grant the scaling subsystem direct access to protected members of game classes.
; The Friend transformer injects a friend declaration at compile time, so the
; FriendClass must be the exact C++ class name (with its U/A prefix).

; Needed to write UFGHealthComponent::mMaxHealth / mCurrentHealth
Friend=(Class="UFGHealthComponent", FriendClass="AHostileScalingSubsystem")

; Needed to write AFGCreatureSpawner respawn time and spawn data array
Friend=(Class="AFGCreatureSpawner", FriendClass="AHostileScalingSubsystem")
